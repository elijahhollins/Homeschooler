<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HomeschoolKit</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,600;12..96,700&family=Newsreader:opsz,wght@6..72,500;6..72,600&family=Hanken+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #f6f8fa; -webkit-font-smoothing: antialiased; }
  body { font-family: 'Plus Jakarta Sans', system-ui, sans-serif; }
  ::selection { background: #cbdcef; }
  /* slim scrollbars */
  ::-webkit-scrollbar { width: 11px; height: 11px; }
  ::-webkit-scrollbar-thumb { background: #d3dae3; border-radius: 99px; border: 3px solid #f6f8fa; }
  ::-webkit-scrollbar-thumb:hover { background: #b9c2cd; }

  @keyframes hk-spin { to { transform: rotate(360deg); } }
  @keyframes hk-fade { from { opacity: 0; } to { opacity: 1; } }
  @keyframes hk-pop { from { opacity: 0; transform: translateY(8px) scale(0.98); } to { opacity: 1; transform: none; } }
  @keyframes hk-toast { from { opacity: 0; transform: translate(-50%, 12px); } to { opacity: 1; transform: translate(-50%, 0); } }

  input::placeholder { color: #98a2b1; }
  button { font-family: inherit; }

  /* ---- Print ---- */
  .hk-print-page { background: #fff; }
  @media print {
    @page { margin: 14mm; }
    body { background: #fff !important; }
    /* hide everything except the print page */
    body > #root > div > .hk-print-root .hk-print-bar,
    body > #root > div > div:not(.hk-print-root) { display: none !important; }
    .hk-print-root { position: static !important; background: #fff !important; }
    .hk-print-scroll { overflow: visible !important; padding: 0 !important; }
    .hk-print-page .hk-sheet { box-shadow: none !important; border: none !important; max-width: 100% !important; padding: 0 !important; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="core.jsx"></script>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="places.jsx"></script>
<script type="text/babel" src="docs.jsx"></script>
<script type="text/babel" src="generators.jsx"></script>
<script type="text/babel" src="place.jsx"></script>
<script type="text/babel" src="screens.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
